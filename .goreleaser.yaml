version: 2

before:
  hooks:
    - go mod download

builds:
  - id: anna
    main: .
    binary: anna
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: anna

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  github:
    owner: vaayne
    name: anna
  draft: false
  prerelease: auto
