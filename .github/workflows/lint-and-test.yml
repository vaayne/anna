name: Lint and Test

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          experimental: true
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        run: mise run lint

  test:
    name: Test
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v3
        with:
          experimental: true
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: mise run test:coverage

      - name: Check coverage threshold
        run: |
          THRESHOLD=50
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets the ${THRESHOLD}% threshold"

      - name: Generate coverage report
        if: github.event_name == 'pull_request'
        id: coverage-report
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}')
          {
            echo 'REPORT<<EOF'
            echo "## 📊 Coverage Report"
            echo ""
            echo "**Total coverage: ${TOTAL}**"
            echo ""
            echo "<details>"
            echo "<summary>Per-package breakdown</summary>"
            echo ""
            echo '```'
            go tool cover -func=coverage.out | grep -v '^total:' | awk '{printf "%-60s %s\n", $1, $NF}' | sort -t'%' -k2 -n
            echo '```'
            echo ""
            echo "</details>"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: ${{ env.REPORT }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7
